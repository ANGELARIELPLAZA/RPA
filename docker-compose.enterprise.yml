services:
  grafana:
    image: grafana/grafana-enterprise:11.2.0
    environment:
      # MongoDB datasource is an Enterprise plugin and requires a valid license token.
      - GF_INSTALL_PLUGINS=grafana-mongodb-datasource
      - GF_ENTERPRISE_LICENSE_PATH=/etc/grafana/license.jwt
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      # Place your license token at ./observability/grafana/license.jwt (not committed).
      - ./observability/grafana/license.jwt:/etc/grafana/license.jwt:ro
