services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:?Define MONGO_ROOT_USERNAME en .env}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD:?Define MONGO_ROOT_PASSWORD en .env}
      - MONGO_APP_DB=${MONGO_APP_DB:-rpa_tracking}
      - MONGO_APP_USERNAME=${MONGO_APP_USERNAME:?Define MONGO_APP_USERNAME en .env}
      - MONGO_APP_PASSWORD=${MONGO_APP_PASSWORD:?Define MONGO_APP_PASSWORD en .env}
    restart: unless-stopped

  rpa-tracking-service:
    build: ./rpa-tracking-service
    container_name: rpa-tracking-service
    depends_on:
      - mongo
    environment:
      - PORT=3100
      - NODE_ENV=production
      - MONGO_URI=mongodb://${MONGO_APP_USERNAME:?}:${MONGO_APP_PASSWORD:?}@mongo:27017/${MONGO_APP_DB:-rpa_tracking}?authSource=admin
      - SERVICE_NAME=rpa-tracking-service
      - REQUEST_TIMEOUT_MS=3000
      - LOG_TO_FILE=true
      - LOG_DIR=/app/logs
      - API_KEY=${TRACKING_API_KEY:-}
      - METRICS_PUBLIC=${TRACKING_METRICS_PUBLIC:-false}
    ports:
      - "3100:3100"
    volumes:
      - ./rpa-tracking-service/logs:/app/logs
    restart: unless-stopped

  rpa-node-v2:
    build: ./RPA-NODE-V2
    container_name: rpa-node-v2
    depends_on:
      - rpa-tracking-service
    env_file:
      - ./RPA-NODE-V2/.env
    ports:
      - "3000:3000"
    volumes:
      - ./RPA-NODE-V2/screenshots:/app/screenshots
      - ./RPA-NODE-V2/logs:/app/logs
      - ./RPA-NODE-V2/videos:/app/videos
    restart: unless-stopped

  loki:
    image: grafana/loki:2.9.8
    container_name: loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3101:3100"
    volumes:
      - ./observability/loki/config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.8
    container_name: promtail
    command: -config.file=/etc/promtail/config.yml -config.expand-env=true
    depends_on:
      - loki
    environment:
      - ENVIRONMENT=production
    volumes:
      - ./observability/promtail/config.yml:/etc/promtail/config.yml:ro
      - ./RPA-NODE-V2/logs:/var/log/rpa-node-v2:ro
      - ./rpa-tracking-service/logs:/var/log/rpa-tracking-service:ro
      - promtail_positions:/tmp
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.53.1
    container_name: prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  node-exporter:
    image: prom/node-exporter:v1.8.1
    container_name: node-exporter
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: blackbox-exporter
    command:
      - --config.file=/etc/blackbox/blackbox.yml
    ports:
      - "9115:9115"
    volumes:
      - ./observability/blackbox/blackbox.yml:/etc/blackbox/blackbox.yml:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    depends_on:
      - loki
      - mongo
      - prometheus
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/rpa-overview.json
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning-oss:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards-oss:/var/lib/grafana/dashboards:ro
    restart: unless-stopped

  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    profiles: ["dev"]
    depends_on:
      - mongo
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongo:27017/?authSource=admin
      - ME_CONFIG_BASICAUTH_USERNAME=${MONGO_EXPRESS_USER:-admin}
      - ME_CONFIG_BASICAUTH_PASSWORD=${MONGO_EXPRESS_PASSWORD:-admin}
    ports:
      - "8081:8081"
    restart: unless-stopped

  metabase:
    image: metabase/metabase:v0.50.21
    container_name: metabase
    profiles: ["analysis"]
    depends_on:
      - mongo
    ports:
      - "3002:3000"
    restart: unless-stopped

volumes:
  mongo_data:
  grafana_data:
  loki_data:
  promtail_positions:
  prometheus_data:
