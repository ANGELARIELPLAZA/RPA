apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      httpMethod: POST

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: task_id
          matcherRegex: '"?task_id"?\\s*[:=]\\s*"?([A-Za-z0-9_-]+)"?'
          url: "/d/rpa-task-monitor/task-monitor?var-task_id=$${__value.raw}"
