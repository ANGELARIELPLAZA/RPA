apiVersion: 1

datasources:
  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    isDefault: true

  # Requiere plugin comunitario instalado: grafana-mongodb-datasource
  - name: MongoDB (rpa_tracking)
    type: grafana-mongodb-datasource
    access: proxy
    editable: true
    jsonData:
      connectionString: mongodb://mongo:27017
      database: rpa_tracking

