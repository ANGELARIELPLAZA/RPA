server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: rpa-node-v2
    static_configs:
      - targets: [localhost]
        labels:
          service: rpa-node-v2
          container: rpa-node-v2
          environment: ${ENVIRONMENT}
          __path__: /var/log/rpa-node-v2/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            severity: severity
      - regex:
          expression: '(?i)\\b(level|lvl|severity)=?(?P<level>trace|debug|info|warn|warning|error|fatal)\\b'
      - regex:
          expression: '(?i)\\b(?P<level>trace|debug|info|warn|warning|error|fatal)\\b'
      - labels:
          level:

  - job_name: rpa-tracking-service
    static_configs:
      - targets: [localhost]
        labels:
          service: rpa-tracking-service
          container: rpa-tracking-service
          environment: ${ENVIRONMENT}
          __path__: /var/log/rpa-tracking-service/*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            severity: severity
      - regex:
          expression: '(?i)\\b(level|lvl|severity)=?(?P<level>trace|debug|info|warn|warning|error|fatal)\\b'
      - regex:
          expression: '(?i)\\b(?P<level>trace|debug|info|warn|warning|error|fatal)\\b'
      - labels:
          level:

